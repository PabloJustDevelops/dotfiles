# =============================================================================
#  Window Rules
# =============================================================================

# ─── Juegos ────────────────────────────────────────────────────────────────
windowrulev2 = fullscreen, class:^(steam_app_)                  # juegos a fullscreen
windowrulev2 = nomaxsize, class:^(steam_app_)                   # quita límite de tamaño
windowrulev2 = noborder, fullscreen:1                           # sin borde en fullscreen real
windowrulev2 = noanim, fullscreen:1                             # sin animación en juegos

# ─── Steam ─────────────────────────────────────────────────────────────────
windowrulev2 = float, class:^(Steam)$, title:^(Friends list)$
windowrulev2 = float, class:^(Steam)$, title:^(Settings)$
windowrulev2 = float, class:^(steam)$, title:^(Steam - Update)$
windowrulev2 = size 60% 60%, class:^(Steam)$, title:^(Friends list)$
windowrulev2 = center, class:^(Steam)$, title:^(Friends list)$

# ─── Diálogos flotantes ────────────────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(File Operation Progress)$
windowrulev2 = float, title:^(Library property)$
windowrulev2 = float, title:^(Properties)$
windowrulev2 = float, title:^(Confirm)$
windowrulev2 = float, title:^(Close Library)$

# ─── Rofi ──────────────────────────────────────────────────────────────────
windowrulev2 = float, class:^(rofi)$
windowrulev2 = center, class:^(rofi)$
windowrulev2 = nofocus, class:^(rofi)$

# ─── Polkit ────────────────────────────────────────────────────────────────
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = center, class:^(polkit-gnome-authentication-agent-1)$

# ─── VPN / Auth ────────────────────────────────────────────────────────────
windowrulev2 = float, title:^(Authenticator)$
windowrulev2 = float, title:^(PIN)$

# ─── Implicit (ninguna ventana debe ocupar todo si no queremos) ────────────
windowrulev2 = nomaxsize, class:^(.*), fullscreen:0
