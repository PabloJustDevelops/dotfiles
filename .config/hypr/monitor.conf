# =============================================================================
#  Monitores
#  Ajusta según tu setup. Para portátil:
#   - eDP-1 es la pantalla interna
#   - HDMI-A-1 / DP-X son externos
# =============================================================================

# Portátil interno — 165Hz (cambia la tasa según tu pantalla)
monitor = eDP-1, preferred, 0x0, 1

# --- Si conectas monitor externo, descomenta y ajusta: ---
# monitor = HDMI-A-1, 2560x1440@144, 1920x0, 1
# monitor = DP-2, 1920x1080@144, 0x0, 1

# --- Si desconectas todo, no se rompa ---
monitor = ,preferred,auto,1
