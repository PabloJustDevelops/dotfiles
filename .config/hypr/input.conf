# =============================================================================
#  Input — teclado, ratón, touchpad
# =============================================================================
input {
    kb_layout = es
    kb_variant =
    kb_model =
    kb_options = compose:ralt
    kb_rules =

    follow_mouse = 1
    mouse_refocus = false
    accel_profile = flat
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
        disable_while_typing = true
        middle_button_emulation = false
        scroll_factor = 0.8
    }

    numlock_by_default = true
    float_switch_override_focus = 2
    force_no_accel = false
    scroll_method = 2fg
}

# --- Layouts adicionales (si escribes en otros idiomas) ---
