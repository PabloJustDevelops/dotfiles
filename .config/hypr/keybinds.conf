# =============================================================================
#  Keybinds — gaming + dev + productividad
#  Modificador principal: SUPER (Windows key)
# =============================================================================
$mainMod = SUPER

# ─── Terminal ────────────────────────────────────────────────────────────
bind = $mainMod, Return, exec, kitty
bind = $mainMod SHIFT, Return, exec, kitty --hold -e btop
bind = $mainMod, T, exec, kitty --tab

# ─── App launcher ────────────────────────────────────────────────────────
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, space, exec, rofi -show drun
bind = $mainMod, Tab, exec, rofi -show window
bind = $mainMod SHIFT, D, exec, rofi -show run

# ─── Kill window ─────────────────────────────────────────────────────────
bind = $mainMod, Q, killactive

# ─── Cerrar sesión ───────────────────────────────────────────────────────
bind = $mainMod CTRL, Q, exit

# ─── Fullscreen / Floating ───────────────────────────────────────────────
bind = $mainMod, F, fullscreen, 1       # fullscreen real
bind = $mainMod SHIFT, F, fullscreen, 0 # fullscreen maximize (sin ocultar barra)
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,             # dwindle pseudotile

# ─── Workspaces (1-9) ────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Navegación rápida entre workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, bracketright, workspace, +1
bind = $mainMod, bracketleft, workspace, -1
bind = $mainMod SHIFT, bracketright, movetoworkspace, +1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, -1

# ─── Movimiento entre ventanas ───────────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ─── Mover ventanas ──────────────────────────────────────────────────────
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ─── Resize (SUPER + CTRL + flechas) ─────────────────────────────────────
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# ─── Scratchpad (ventana flotante oculta) ────────────────────────────────
bind = $mainMod, S, togglespecialworkspace,
bind = $mainMod SHIFT, S, movetoworkspace, special

# ─── Screenshots ─────────────────────────────────────────────────────────
bind = , Print, exec, grimblast --notify copysave area
bind = SHIFT, Print, exec, grimblast --notify copysave screen
bind = CTRL, Print, exec, grimblast --notify copysave output

# ─── Gaming ──────────────────────────────────────────────────────────────
bind = $mainMod, G, exec, gamemoderun mangohud %command%  # placeholder

# ─── Multimedia ──────────────────────────────────────────────────────────
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

# ─── Misc ────────────────────────────────────────────────────────────────
bind = $mainMod, E, exec, thunar
bind = $mainMod, R, submap, resize

submap = resize
binde = , left, resizeactive, -30 0
binde = , right, resizeactive, 30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
bind = , escape, submap, reset
submap = reset

bind = $mainMod, Escape, exec, rofi -show power-menu -modi "power-menu:rofi-power-menu"
