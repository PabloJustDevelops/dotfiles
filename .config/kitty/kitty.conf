# =============================================================================
#  Kitty — Terminal config (gaming + dev)
# =============================================================================

# ─── Font ──────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12
adjust_line_height  2
adjust_column_width 0

# ─── Layout ─────────────────────────────────────────────────────────────────
window_padding_width 6
hide_window_decoration no
confirm_os_window_close 0
tab_bar_style powerline
tab_bar_min_tabs 2

# ─── Rendimiento ────────────────────────────────────────────────────────────
# Va muy bien en NVIDIA Wayland
background_opacity 0.88
background_blur 6
sync_to_monitor yes
repaint_defer 6

# ─── Catppuccin Mocha colors ────────────────────────────────────────────────
foreground #cdd6f4
background #1e1e2e
selection_foreground #1e1e2e
selection_background #cba6f7

# Black
color0 #45475a
color8 #585b70

# Red
color1 #f38ba8
color9 #f38ba8

# Green
color2 #a6e3a1
color10 #a6e3a1

# Yellow
color3 #f9e2af
color11 #f9e2af

# Blue
color4 #89b4fa
color12 #89b4fa

# Magenta
color5 #cba6f7
color13 #cba6f7

# Cyan
color6 #94e2d5
color14 #94e2d5

# White
color7 #bac2de
color15 #a6adc8

# ─── Scrollback ─────────────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager_history_size 100

# ─── Mouse ──────────────────────────────────────────────────────────────────
mouse_hide_wait 2
url_color #89b4fa
url_style curly
detect_urls yes
copy_on_select clipboard

# ─── Shell ──────────────────────────────────────────────────────────────────
shell_integration enabled
allow_remote_control yes
