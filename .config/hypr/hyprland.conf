# =============================================================================
#  Hyprland Config — modular
#  Base: JaKooLit / LinuxBeginnings (estilo)
#  Customizaciones personales en ~/.config/hypr/user.conf
# =============================================================================

source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitor.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/user.conf

# =============================================================================
#  General
# =============================================================================
general {
    layout = dwindle

    gaps_in = 4
    gaps_out = 6
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(94e2d5ee) 45deg
    col.inactive_border = rgba(45475a88)

    cursor_inactive_timeout = 3
    no_cursor_warps = false
    resize_on_border = true
    allow_tearing = true
}

# =============================================================================
#  Decoration
# =============================================================================
decoration {
    rounding = 8
    drop_shadow = yes
    shadow_range = 8
    shadow_offset = 2 2
    shadow_render_power = 3
    col.shadow = rgba(11111b55)

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = on
        ignore_opacity = true
        xray = true
    }
}

# =============================================================================
#  Gestures
# =============================================================================
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_infinite = true
}

# =============================================================================
#  Misc
# =============================================================================
misc {
    disable_autoreload = false
    enable_swallow = true
    swallow_regex = ^(kitty)$
    focus_on_activate = true
    vfr = true
    vrr = 2
    animate_mouse_windowdragging = true
    disable_hyprland_logo = true
    render_ahead_of_time = true
    render_ahead_safezone = 1
}

# =============================================================================
#  Window management
# =============================================================================
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
    permanent_direction_priority = false
}

master {
    new_is_master = true
    mfact = 0.60
    smart_resizing = false
    always_center_master = true
}

# =============================================================================
#  Plugins
# =============================================================================
